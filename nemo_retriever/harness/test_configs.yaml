datasets:
  bo20:
    path: /datasets/nv-ingest/bo20
    query_csv: null
    input_type: pdf
    recall_required: false
    evaluation_mode: none

  bo767:
    path: /datasets/nv-ingest/bo767
    query_csv: data/bo767_annotations.csv
    input_type: pdf
    recall_required: false
    evaluation_mode: beir
    beir_loader: bo767_csv
    beir_doc_id_field: pdf_page
    table_extraction_method: nemotron_parse

  jp20:
    path: /datasets/nv-ingest/jp20
    query_csv: data/jp20_query_gt.csv
    input_type: pdf
    recall_required: false
    evaluation_mode: beir
    beir_loader: jp20_csv
    beir_doc_id_field: pdf_page

  earnings:
    path: /datasets/nv-ingest/earnings_consulting
    query_csv: data/earnings_consulting_multimodal.csv
    input_type: pdf
    recall_required: false
    evaluation_mode: beir
    beir_loader: earnings_csv
    beir_doc_id_field: pdf_page

  bo10k:
    path: /datasets/nv-ingest/bo10k
    query_csv: data/digital_corpora_10k_annotations.csv
    input_type: pdf
    recall_required: false
    evaluation_mode: beir
    beir_loader: bo10k_csv
    beir_doc_id_field: pdf_page

  # FinanceBench uses document-level BEIR matching on PDF basename.
  financebench:
    path: /datasets/nv-ingest/financebench
    query_csv: data/financebench_train.json
    input_type: pdf
    recall_required: false
    evaluation_mode: beir
    beir_loader: financebench_json
    beir_doc_id_field: pdf_basename

  audio_retrieval:
    path: /datasets/nv-ingest/audio_retrieval_data_mp3
    query_csv: /datasets/nv-ingest/video_retrieval_eval_gt_audio_only.csv
    input_type: audio
    evaluation_mode: audio_recall
    segment_audio: true
    audio_split_type: time
    audio_split_interval: 36000
    recall_required: true
    recall_match_mode: audio_segment
    recall_adapter: none
    audio_match_tolerance_secs: 2.0
    embed_model_name: nvidia/llama-nemotron-embed-1b-v2
    embed_modality: text
    embed_granularity: element

  video_retrieval:
    path: /datasets/nv-ingest/video_retrieval_data
    query_csv: /datasets/nv-ingest/video_retrieval_eval_gt.csv
    input_type: video
    segment_audio: true
    audio_split_type: time
    audio_split_interval: 36000
    video_extract_audio: true
    video_extract_frames: true
    video_frame_fps: 0.05
    video_av_fuse: true
    recall_required: true
    recall_match_mode: audio_segment
    recall_adapter: none
    audio_match_tolerance_secs: 2.0
    embed_model_name: nvidia/llama-nemotron-embed-vl-1b-v2
    embed_modality: text
    embed_granularity: element

  vidore_v3_computer_science:
    path: /datasets/nv-ingest/vidore_v3_corpus_pdf/vidore_v3_computer_science
    query_csv: null
    recall_required: false
    evaluation_mode: beir
    beir_loader: vidore_hf
    beir_dataset_name: vidore_v3_computer_science
    beir_doc_id_field: pdf_basename
    embed_model_name: nvidia/llama-nemotron-embed-vl-1b-v2
    embed_modality: text_image
    embed_granularity: page
